  <desc>Email signature logo with 404 badge and wordmark on dark background</desc>

  
  
  <rect x="0" y="0" width="130" height="22" rx="3" fill="#1E1610" stroke="#3d2a10" stroke-width="0.5"></rect>
  <text x="7" y="15.5" font-family="&#39;Courier New&#39;, Courier, monospace" font-size="10" font-weight="400" fill="#E8C99A" letter-spacing="1.5">404</text>
  <rect x="36" y="3" width="0.75" height="16" fill="#3d2a10"></rect>
  <text x="42" y="15.5" font-family="&#39;Courier New&#39;, Courier, monospace" font-size="10" font-weight="400" fill="#B87333" letter-spacing="1.5">TRADE</text>
  <rect x="106" y="3" width="0.75" height="16" fill="#3d2a10"></rect>
  <text x="112" y="15.5" font-family="&#39;Courier New&#39;, Courier, monospace" font-size="10" font-weight="400" fill="#E8C99A" letter-spacing="1.5">OS</text>

  
  <text x="0" y="50" font-family="system-ui, -apple-system, &#39;Segoe UI&#39;, sans-serif" font-size="26" font-weight="500" fill="#F7F2EC" letter-spacing="-0.75">Trade<tspan fill="#B87333">OS</tspan></text>
