<!-- @dsCard group="Colors" viewport="700x150" name="Text tones" subtitle="Bone, warm gray, rust — on forge black" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 20px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: 10px; overflow: hidden; border: 1px solid var(--color-forge-border); }
  .chip { height: 66px; display:flex; align-items:center; justify-content:center; font-family: var(--font-sans); font-size: 15px; }
  .meta { padding: 8px 10px; background: var(--color-forge-dark); }
  .name { color: var(--color-bone); font-size: 12px; font-family: var(--font-sans); font-weight: 500; }
  .hex { color: var(--color-copper); font-size: 11px; margin-top: 2px; }
  .role { color: var(--color-forge-rust); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0D0A07;color:#F7F2EC">Aa</div><div class="meta"><div class="role">Headings · AAA 18:1</div><div class="name">Bone</div><div class="hex">#F7F2EC</div></div></div>
    <div class="sw"><div class="chip" style="background:#0D0A07;color:#C8C0B0">Aa</div><div class="meta"><div class="role">Body · AAA 7.8:1</div><div class="name">Warm gray</div><div class="hex">#C8C0B0</div></div></div>
    <div class="sw"><div class="chip" style="background:#0D0A07;color:#998066">Aa</div><div class="meta"><div class="role">Muted · AA 5.3:1</div><div class="name">Rust</div><div class="hex">#998066</div></div></div>
  </div>
</body></html>
