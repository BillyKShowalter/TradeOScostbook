<!-- @dsCard group="Colors" viewport="700x150" name="Forge — surfaces & borders" subtitle="Dark backgrounds and dividers" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 20px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: 10px; overflow: hidden; border: 1px solid var(--color-forge-border); }
  .chip { height: 66px; }
  .meta { padding: 8px 10px; background: var(--color-forge-dark); }
  .name { color: var(--color-bone); font-size: 12px; font-family: var(--font-sans); font-weight: 500; }
  .hex { color: var(--color-copper); font-size: 11px; margin-top: 2px; }
  .role { color: var(--color-forge-rust); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#0D0A07"></div><div class="meta"><div class="role">Primary bg</div><div class="name">Forge black</div><div class="hex">#0D0A07</div></div></div>
    <div class="sw"><div class="chip" style="background:#1E1610"></div><div class="meta"><div class="role">Cards / raised</div><div class="name">Forge dark</div><div class="hex">#1E1610</div></div></div>
    <div class="sw"><div class="chip" style="background:#3d2a10"></div><div class="meta"><div class="role">Borders</div><div class="name">Forge border</div><div class="hex">#3d2a10</div></div></div>
  </div>
</body></html>
