<!-- @dsCard group="Colors" viewport="700x150" name="Copper — primary accent" subtitle="The sole accent. Copper, light, dark." -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 20px; font-family: var(--font-mono); }
  .row { display: flex; gap: 14px; }
  .sw { flex: 1; border-radius: 10px; overflow: hidden; border: 1px solid var(--color-forge-border); }
  .chip { height: 66px; }
  .meta { padding: 8px 10px; background: var(--color-forge-dark); }
  .name { color: var(--color-bone); font-size: 12px; font-family: var(--font-sans); font-weight: 500; }
  .hex { color: var(--color-copper); font-size: 11px; margin-top: 2px; }
  .role { color: var(--color-forge-rust); font-size: 9px; letter-spacing: 0.1em; text-transform: uppercase; }
</style></head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#B87333"></div><div class="meta"><div class="role">Accent / CTA</div><div class="name">Copper</div><div class="hex">#B87333</div></div></div>
    <div class="sw"><div class="chip" style="background:#E8C99A"></div><div class="meta"><div class="role">Highlights</div><div class="name">Copper light</div><div class="hex">#E8C99A</div></div></div>
    <div class="sw"><div class="chip" style="background:#8A5620"></div><div class="meta"><div class="role">Hover / press</div><div class="name">Copper dark</div><div class="hex">#8A5620</div></div></div>
  </div>
</body></html>
