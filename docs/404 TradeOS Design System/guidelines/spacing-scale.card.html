<!-- @dsCard group="Spacing" viewport="700x230" name="Spacing scale" subtitle="4 · 8 · 16 · 24 · 40 · 64" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 22px; font-family: var(--font-mono); }
  .row { display:flex; align-items:center; gap: 14px; margin-bottom: 9px; }
  .lbl { width: 92px; font-size: 11px; color: var(--color-forge-rust); flex-shrink:0; }
  .bar { height: 10px; border-radius: 2px; background: var(--color-copper); }
  .use { font-size: 11px; color: var(--color-forge-muted); font-family: var(--font-sans); }
</style></head>
<body>
  <div class="row"><span class="lbl">xs — 4</span><div class="bar" style="width:4px"></div><span class="use">icon gaps</span></div>
  <div class="row"><span class="lbl">sm — 8</span><div class="bar" style="width:8px"></div><span class="use">component gaps</span></div>
  <div class="row"><span class="lbl">md — 16</span><div class="bar" style="width:16px"></div><span class="use">default padding, grid gaps</span></div>
  <div class="row"><span class="lbl">lg — 24</span><div class="bar" style="width:24px"></div><span class="use">card padding</span></div>
  <div class="row"><span class="lbl">xl — 40</span><div class="bar" style="width:40px"></div><span class="use">page section padding</span></div>
  <div class="row"><span class="lbl">2xl — 64</span><div class="bar" style="width:64px"></div><span class="use">major section breaks</span></div>
</body></html>
