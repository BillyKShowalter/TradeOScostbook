<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 20px; }
  .row { display: flex; gap: 16px; }
  .box { flex:1; display:flex; align-items:center; justify-content:center; border-radius: 10px; padding: 26px; }
  .dark { background: var(--color-forge-black); border: 1px solid var(--color-forge-border); }
  .light { background: var(--color-bone); }
  img { width: 220px; height: auto; }
</style></head>
<body>
  <div class="row">
    <div class="box dark"><img src="../assets/logos/tradeos-logo-primary-dark.svg" alt="TradeOS logo on dark"></div>
    <div class="box light"><img src="../assets/logos/tradeos-logo-primary-light.svg" alt="TradeOS logo on light"></div>
  </div>
</body></html>
