<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 24px; }
  .display { font-family: var(--font-display); font-weight: 500; font-size: 46px; letter-spacing: -0.033em; color: var(--color-bone); line-height: 1; }
  .display .os { color: var(--color-copper); }
  .spec { font-family: var(--font-mono); font-size: 11px; color: var(--color-forge-rust); letter-spacing: 0.12em; margin-top: 14px; }
</style></head>
<body>
  <div class="display">Trade<span class="os">OS</span> — web for the trades</div>
  <div class="spec">SPACE GROTESK · 46px · 500 · -0.033em · headlines &amp; wordmark only</div>
</body></html>
