<!-- @dsCard group="Spacing" viewport="700x160" name="Corner radii" subtitle="Sharp & industrial: 2–14px + pill" -->
<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; background: var(--color-forge-black); padding: 22px; font-family: var(--font-mono); }
  .row { display:flex; gap: 22px; align-items:flex-end; }
  .item { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .box { width: 52px; height: 52px; background: var(--color-copper); }
  .cap { font-size: 10px; color: var(--color-forge-rust); }
</style></head>
<body>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><span class="cap">2 · frames</span></div>
    <div class="item"><div class="box" style="border-radius:3px"></div><span class="cap">3 · inputs</span></div>
    <div class="item"><div class="box" style="border-radius:6px"></div><span class="cap">6 · buttons</span></div>
    <div class="item"><div class="box" style="border-radius:10px"></div><span class="cap">10 · cards</span></div>
    <div class="item"><div class="box" style="border-radius:14px"></div><span class="cap">14 · panels</span></div>
    <div class="item"><div class="box" style="width:72px;height:28px;border-radius:999px"></div><span class="cap">pill · badges</span></div>
  </div>
</body></html>
