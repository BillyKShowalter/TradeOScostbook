name: Docs consistency

on:
  pull_request:

permissions:
  contents: read

jobs:
  docs-consistency:
    name: Docs consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install docs checker dependencies
        run: npm ci

      - name: Run docs consistency check
        run: npm run docs:check -- --base "origin/${{ github.base_ref }}"
