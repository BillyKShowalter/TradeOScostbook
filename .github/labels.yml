# TradeOS label taxonomy.
# Keep this file aligned with docs/REPOSITORY_GOVERNANCE.md.

- name: "type:bug"
  color: "d73a4a"
  description: "A reproducible defect or regression."
- name: "type:feature"
  color: "0e8a16"
  description: "A new product capability or workflow."
- name: "type:task"
  color: "1d76db"
  description: "Bounded implementation, verification, or hardening work."
- name: "type:docs"
  color: "0075ca"
  description: "Documentation, handoff, source-of-truth, or knowledge-base work."
- name: "type:governance"
  color: "5319e7"
  description: "Repository rules, templates, labels, checks, or contributor workflow."
- name: "type:security"
  color: "b60205"
  description: "Security review, hardening, or vulnerability remediation."
- name: "type:test"
  color: "c2e0c6"
  description: "Testing, fixtures, CI verification, or coverage work."
- name: "type:refactor"
  color: "fbca04"
  description: "Behavior-preserving internal restructuring."

- name: "area:backend"
  color: "5319e7"
  description: "Express API, services, modules, auth, or backend tests."
- name: "area:frontend"
  color: "c5def5"
  description: "Next.js routes, components, client/server rendering, or frontend tests."
- name: "area:database"
  color: "0052cc"
  description: "Prisma schema, migrations, RLS, seeds, or database performance."
- name: "area:auth-tenancy"
  color: "b60205"
  description: "JWT, membership, authorization, RLS, or org isolation."
- name: "area:estimating"
  color: "7057ff"
  description: "Estimate engine, AI estimate assist, proposals-adjacent estimating."
- name: "area:costbook"
  color: "0e8a16"
  description: "Cost items, labor, materials, equipment, assemblies, and pricing inputs."
- name: "area:jobs-scheduling"
  color: "fbca04"
  description: "Jobs, scheduling, dispatcher, technician assignment, or field workflows."
- name: "area:customer-portal"
  color: "bfdadc"
  description: "Customer-facing portal and document-view surfaces."
- name: "area:governance"
  color: "5319e7"
  description: "Repository governance, docs ownership, PR policy, templates, or labels."

- name: "priority:p0"
  color: "b60205"
  description: "Production outage, data loss, or security exposure."
- name: "priority:p1"
  color: "d93f0b"
  description: "Release blocker or major workflow break."
- name: "priority:p2"
  color: "fbca04"
  description: "Important issue with a workaround."
- name: "priority:p3"
  color: "cfd3d7"
  description: "Low-risk polish, follow-up, or edge case."

- name: "risk:rls"
  color: "b60205"
  description: "Touches row-level security or tenant isolation."
- name: "risk:migration"
  color: "d93f0b"
  description: "Touches schema, migrations, seeds, or database rollout."
- name: "risk:data-loss"
  color: "b60205"
  description: "Could delete, corrupt, or expose persisted business data."
- name: "risk:release-blocker"
  color: "d93f0b"
  description: "Blocks RC1 readiness or safe production operation."
- name: "risk:external-service"
  color: "fbca04"
  description: "Depends on Supabase, GitHub, Vercel, supplier feeds, or another external service."

- name: "status:needs-triage"
  color: "ededed"
  description: "Needs owner, priority, scope, or next action."
- name: "status:blocked"
  color: "b60205"
  description: "Cannot proceed without external input or environment change."
- name: "status:ready-for-review"
  color: "0e8a16"
  description: "Ready for reviewer attention."
- name: "status:do-not-merge"
  color: "b60205"
  description: "Must not merge until the blocker is removed."
- name: "status:stale"
  color: "cfd3d7"
  description: "Likely outdated relative to current main."
- name: "status:superseded"
  color: "cfd3d7"
  description: "Replaced by newer work or merged source-of-truth changes."

- name: "owner:codex-backend"
  color: "1d76db"
  description: "Backend, services, validation, data, and verification owner lane."
- name: "owner:claude-ui"
  color: "c5def5"
  description: "UI, design-system presentation, navigation, and contractor UX owner lane."
- name: "owner:human-review"
  color: "fbca04"
  description: "Needs explicit human product, security, or governance review."
